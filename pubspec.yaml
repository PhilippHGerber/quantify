name: quantify
description: >
  Type-safe unit conversion and measurement library.
  Convert 30+ units like length, mass, temperature, pressure, speed, and energy
  with compile-time safety and fast performance.
version: 0.20.1
homepage: https://github.com/PhilippHGerber/quantify
repository: https://github.com/PhilippHGerber/quantify
issue_tracker: https://github.com/PhilippHGerber/quantify/issues

environment:
  sdk: ^3.6.0

workspace:
  - example

dependencies:
  intl: ^0.20.2
  meta: ^1.17.0

dev_dependencies:
  test: ^1.31.0
  very_good_analysis: ^10.2.0

topics:
  - units
  - unit-converter
  - measurement
  - physics
  - converter

screenshots:
  - description: "Quantify - Convert SI Units"
    path: pub/quantify.webp
